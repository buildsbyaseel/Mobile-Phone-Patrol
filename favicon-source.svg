<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>

  <!-- Phone body -->
  <rect x="62" y="26" width="68" height="124" rx="11" fill="white" opacity="0.95"/>

  <!-- Screen -->
  <rect x="70" y="42" width="52" height="78" rx="4" fill="#1e1b4b"/>

  <!-- Speaker grille -->
  <rect x="79" y="33" width="34" height="5" rx="2.5" fill="#c4b5fd"/>

  <!-- Home bar -->
  <rect x="79" y="134" width="34" height="6" rx="3" fill="#c4b5fd"/>

  <!-- RP on screen -->
  <text x="96" y="89"
    font-family="Arial Black, Arial, sans-serif"
    font-size="28"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-1">RP</text>

  <!-- Purple accent underline -->
  <rect x="40" y="163" width="112" height="5" rx="2.5" fill="#7c3aed"/>
</svg>
